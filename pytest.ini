[pytest]
# Directory contenente i test
testpaths = tests

# Pattern per la scoperta dei test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opzioni di default
# -v verbose output
# --tb=short traceback breve
# --strict-marker verifica che i marker siano registrati, i marker non dichiarati causeranno errore
# -ra mostra un riepilogo di tutti i test falliti e saltati
addopts = 
    -v 
    --tb=short 
    --strict-markers 
    -ra 

# Marker personalizzati, definiti per personalizzare i test tramite il decoratore @pytest.mark.slow, @pytest.mark.integration, @pytest.mark.unit, ecc.
markers =
    slow: test lenti che richiedono più tempo
    integration: test di integrazione
    unit: test unitari

# Timeout di default per ogni test (in secondi)
timeout = 60

# Ignora warning specifici
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
